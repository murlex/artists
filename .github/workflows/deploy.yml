name: Deploy To GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Configure path prefix
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_NAME="${GITHUB_REPOSITORY%/*}"

          if [ -f CNAME ]; then
            echo "ELEVENTY_PATH_PREFIX=/" >> $GITHUB_ENV
          elif [ "$REPO_NAME" = "$OWNER_NAME.github.io" ]; then
            echo "ELEVENTY_PATH_PREFIX=/" >> $GITHUB_ENV
          else
            echo "ELEVENTY_PATH_PREFIX=/$REPO_NAME/" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify deployment is live
        env:
          DEPLOY_URL: ${{ steps.deployment.outputs.page_url }}
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Verifying deployment at $DEPLOY_URL ..."
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L --connect-timeout 10 "$DEPLOY_URL" 2>/dev/null || echo "000")
            echo "Attempt $i/6: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Deployment verified and live!"
              exit 0
            fi
            sleep 10
          done
          echo "Site not live after 1 minute (stuck CDN deployment)."
          if [ "${{ github.run_attempt }}" = "1" ]; then
            echo "Triggering automatic re-run to resolve the issue..."
            gh api -X POST /repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/rerun
            exit 1
          else
            echo "::error::Site still not live after automatic re-run. Check GitHub Pages settings at https://github.com/${{ github.repository }}/settings/pages"
            exit 1
          fi

